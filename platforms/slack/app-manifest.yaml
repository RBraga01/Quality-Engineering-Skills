display_information:
  name: Quality Engineering Assistant
  description: "8D coaching, FMEA review, NCR writing, root cause analysis, and ISO 9001 / IATF 16949 audit. Powered by Quality-Engineering-Skills."
  background_color: "#060b0f"
  long_description: |
    Structured quality engineering methodology for AI agents.

    Supports 8D coaching (D0–D8 with validation gates), PFMEA/DFMEA gap review against AIAG-VDA 2019, professional NCR writing from bullet inputs, structured 5-Why root cause analysis, and interactive ISO 9001 / IATF 16949 internal audit.

    Powered by Quality-Engineering-Skills — github.com/RBraga01/Quality-Engineering-Skills

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: QE Assistant
    always_online: true
  slash_commands:
    - command: /8d
      description: Start or evaluate an 8D problem-solving investigation
      usage_hint: "[complaint description] or [paste existing 8D to evaluate]"
      should_escape: false
    - command: /fmea
      description: Review a PFMEA or DFMEA against AIAG-VDA 2019
      usage_hint: "[paste FMEA content or describe process to review]"
      should_escape: false
    - command: /ncr
      description: Write a professional NCR from bullet-point observations
      usage_hint: "[bullet points describing the defect]"
      should_escape: false
    - command: /rca
      description: Run a structured 5-Why root cause analysis
      usage_hint: "[problem statement]"
      should_escape: false
    - command: /audit
      description: Start an ISO 9001 or IATF 16949 internal audit
      usage_hint: "[iso9001 | iatf | both] [scope description]"
      should_escape: false
    - command: /qe-help
      description: Show all Quality Engineering Assistant commands
      usage_hint: ""
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.public
      - commands
      - files:read
      - groups:history
      - im:history
      - im:read
      - im:write
      - mpim:history
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
