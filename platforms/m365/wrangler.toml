name = "quality-engineering-assistant-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
# Set secrets via:
#   wrangler secret put ANTHROPIC_API_KEY

# After first deploy, add a custom domain in the Cloudflare dashboard:
#   Workers & Pages → quality-engineering-assistant-api → Settings → Triggers → Custom Domains
#   Add: api.quality-engineering-skills.io
#
# Then update platforms/m365/openapi.yaml server url to:
#   https://api.quality-engineering-skills.io/v1
